<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뮤지컬 대사</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #fdfbf8; }
        #root { width: 100%; min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // 외부 라이브러리 제거, 순수 React만 사용
        function MusicalQuotesApp() {
            const [quotes] = React.useState([
                { quote: "난 포기하지 않아. 절대로.", musical: "넘버나인", character: "준호", emotion: "결연" },
                { quote: "사랑한다는 것은 용감한 것이야", musical: "르미제라블", character: "마리우스", emotion: "사랑" }
            ]);
            
            return (
                <div style={{ padding: '40px', textAlign: 'center', maxWidth: '600px', margin: '0 auto' }}>
                    <h1 style={{ marginBottom: '10px' }}>🎭 뮤지컬 대사</h1>
                    <p style={{ marginBottom: '30px', color: '#666' }}>마음에 드는 대사를 매일 만나보세요</p>
                    
                    {quotes.length > 0 && (
                        <div style={{ 
                            background: 'white', 
                            padding: '30px', 
                            borderRadius: '12px',
                            boxShadow: '0 2px 8px rgba(0,0,0,0.1)',
                            marginBottom: '20px'
                        }}>
                            <p style={{ fontSize: '18px', fontWeight: 'bold', marginBottom: '15px' }}>
                                "{quotes[0].quote}"
                            </p>
                            <p style={{ color: '#666', marginBottom: '10px' }}>
                                {quotes[0].musical} - {quotes[0].character}
                            </p>
                            <button style={{
                                padding: '10px 20px',
                                background: '#e8dcc8',
                                border: 'none',
                                borderRadius: '20px',
                                cursor: 'pointer',
                                fontWeight: 'bold'
                            }}>
                                ❤️ 좋아요
                            </button>
                        </div>
                    )}
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MusicalQuotesApp />);
    </script>
</body>
</html>
