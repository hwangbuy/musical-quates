<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뮤지컬 대사</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        import React, { useState, useEffect } from 'react';
import { Search, Plus, Heart, Share2, ChevronRight } from 'lucide-react';

export default function MusicalQuotesApp() {
  const [quotes, setQuotes] = useState([]);
  const [dailyQuote, setDailyQuote] = useState(null);
  const [searchTerm, setSearchTerm] = useState('');
  const [selectedEmotion, setSelectedEmotion] = useState('all');
  const [activeTab, setActiveTab] = useState('today');
  const [showAddForm, setShowAddForm] = useState(false);
  const [favorites, setFavorites] = useState([]);
  const [formData, setFormData] = useState({
    quote: '',
    musical: '',
    character: '',
    emotion: '희망'
  });

  // 초기 대사 데이터
  const initialQuotes = [
    { id: 1, quote: "난 포기하지 않아. 절대로.", musical: "넘버나인", character: "준호", emotion: "희망", year: 2022 },
    { id: 2, quote: "나는 왜 자꾸만 그리워하는 걸까?", musical: "알렉산더", character: "알렉산더", emotion: "그리움", year: 2023 },
    { id: 3, quote: "사랑한다는 것은 용감한 것이야.", musical: "르미제라블", character: "마리우스", emotion: "사랑", year: 2021 },
    { id: 4, quote: "이 세상에서 가장 아름다운 것은 희망이야.", musical: "지킬앤하이드", character: "지킬", emotion: "희망", year: 2022 },
    { id: 5, quote: "우리는 모두 누군가의 주인공이야.", musical: "비포", character: "루카", emotion: "위로", year: 2023 },
    { id: 6, quote: "내 인생은 나의 것이야.", musical: "라보엠", character: "미미", emotion: "결연", year: 2020 },
    { id: 7, quote: "기억해줄 거야? 나를?", musical: "오페라의 유령", character: "크리스틴", emotion: "그리움", year: 2022 },
    { id: 8, quote: "우린 죽지 않아. 우린 다시 시작할 뿐이야.", musical: "해밀턴", character: "해밀턴", emotion: "희망", year: 2023 },
    { id: 9, quote: "사랑은 아프지만, 살 가치가 있어.", musical: "신데렐라", character: "신데렐라", emotion: "사랑", year: 2021 },
    { id: 10, quote: "내 인생을 지배하는 건 오직 나야.", musical: "에비타", character: "에비타", emotion: "결연", year: 2022 },
    { id: 11, quote: "혼자가 아니라는 걸 알아?", musical: "데어데블", character: "엘렉트라", emotion: "위로", year: 2023 },
    { id: 12, quote: "내일은 새로운 날이야.", musical: "애니", character: "애니", emotion: "희망", year: 2020 },
    { id: 13, quote: "우린 모두 부서지기도 하고 다시 일어서기도 해.", musical: "킹과 아이", character: "안나", emotion: "위로", year: 2021 },
    { id: 14, quote: "꿈을 꾸지 않으면 이루지 못해.", musical: "빅", character: "조시", emotion: "희망", year: 2022 },
    { id: 15, quote: "사랑하는 사람을 잃는 것보다 큰 고통은 없어.", musical: "팬텀", character: "팬텀", emotion: "슬픔", year: 2023 },
    { id: 16, quote: "내가 누군지 알아? 난 자유로워.", musical: "라라랜드", character: "세바스찬", emotion: "결연", year: 2022 },
    { id: 17, quote: "모두가 주목하지 않아도 내 인생은 소중해.", musical: "데미안", character: "데미안", emotion: "위로", year: 2021 },
    { id: 18, quote: "너도 될 수 있어. 진짜야.", musical: "프로미세스", character: "로나", emotion: "희망", year: 2023 },
    { id: 19, quote: "끝이 아니라 시작이야.", musical: "체리픽", character: "주인공", emotion: "희망", year: 2020 },
    { id: 20, quote: "자신을 믿어야 해. 그게 전부야.", musical: "헬로, 돌리!", character: "돌리", emotion: "결연", year: 2022 },
    { id: 21, quote: "사랑은 약함이 아니야. 가장 큰 힘이야.", musical: "힘", character: "전사", emotion: "사랑", year: 2020 },
    { id: 22, quote: "지금 이 순간이 최고야.", musical: "순간", character: "주인공", emotion: "희망", year: 2020 },
    { id: 23, quote: "내 눈물이 내 약함이 아니야.", musical: "눈물", character: "주인공", emotion: "위로", year: 2020 },
    { id: 24, quote: "하지만 우린 살았어. 정말로.", musical: "살아감", character: "생존자", emotion: "희망", year: 2023 },
    { id: 25, quote: "넌 충분히 좋아.", musical: "충분", character: "부모", emotion: "위로", year: 2020 },
  ];

  useEffect(() => {
    setQuotes(initialQuotes);
    loadDailyQuote();
    loadFavorites();
  }, []);

  const loadDailyQuote = () => {
    const today = new Date().toDateString();
    const savedDate = localStorage.getItem('dailyQuoteDate');
    const savedQuote = localStorage.getItem('dailyQuote');

    if (savedDate === today && savedQuote) {
      setDailyQuote(JSON.parse(savedQuote));
    } else {
      const randomQuote = initialQuotes[Math.floor(Math.random() * initialQuotes.length)];
      setDailyQuote(randomQuote);
      localStorage.setItem('dailyQuoteDate', today);
      localStorage.setItem('dailyQuote', JSON.stringify(randomQuote));
    }
  };

  const loadFavorites = () => {
    const saved = localStorage.getItem('favorites');
    setFavorites(saved ? JSON.parse(saved) : []);
  };

  const toggleFavorite = (id) => {
    const updated = favorites.includes(id)
      ? favorites.filter(fav => fav !== id)
      : [...favorites, id];
    setFavorites(updated);
    localStorage.setItem('favorites', JSON.stringify(updated));
  };

  const addQuote = (e) => {
    e.preventDefault();
    if (formData.quote && formData.musical) {
      const newQuote = {
        id: Math.max(...quotes.map(q => q.id), 0) + 1,
        quote: formData.quote,
        musical: formData.musical,
        character: formData.character || '미상',
        emotion: formData.emotion,
        year: new Date().getFullYear()
      };
      setQuotes([newQuote, ...quotes]);
      setFormData({ quote: '', musical: '', character: '', emotion: '희망' });
      setShowAddForm(false);
    }
  };

  const filteredQuotes = quotes.filter(q => {
    const matchesSearch = q.quote.includes(searchTerm) || 
                         q.musical.includes(searchTerm) ||
                         q.character.includes(searchTerm);
    const matchesEmotion = selectedEmotion === 'all' || q.emotion === selectedEmotion;
    return matchesSearch && matchesEmotion;
  });

  const emotions = ['all', '희망', '사랑', '위로', '그리움', '결연', '슬픔'];
  const emotionColors = {
    '희망': 'bg-yellow-100 text-yellow-800',
    '사랑': 'bg-red-100 text-red-800',
    '위로': 'bg-blue-100 text-blue-800',
    '그리움': 'bg-purple-100 text-purple-800',
    '결연': 'bg-orange-100 text-orange-800',
    '슬픔': 'bg-indigo-100 text-indigo-800'
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-purple-50 to-pink-50">
      {/* 헤더 */}
      <header className="sticky top-0 z-50 bg-white shadow-sm">
        <div className="max-w-4xl mx-auto px-4 py-4">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600">
                🎭 뮤지컬 대사
              </h1>
              <p className="text-sm text-gray-600 mt-1">매일 마음을 울리는 대사를 만나보세요</p>
            </div>
          </div>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-4 py-8">
        {/* 탭 네비게이션 */}
        <div className="flex gap-2 mb-8 overflow-x-auto">
          {['today', 'explore', 'favorites'].map(tab => (
            <button
              key={tab}
              onClick={() => setActiveTab(tab)}
              className={`px-6 py-2 rounded-full font-semibold transition-all whitespace-nowrap ${
                activeTab === tab
                  ? 'bg-gradient-to-r from-purple-600 to-pink-600 text-white'
                  : 'bg-white text-gray-700 hover:bg-gray-50 border'
              }`}
            >
              {tab === 'today' && '📅 오늘의 대사'}
              {tab === 'explore' && '🔍 탐색'}
              {tab === 'favorites' && '❤️ 즐겨찾기'}
            </button>
          ))}
        </div>

        {/* 오늘의 대사 탭 */}
        {activeTab === 'today' && dailyQuote && (
          <div className="space-y-6">
            <div className="bg-gradient-to-br from-purple-500 via-pink-500 to-red-500 rounded-3xl p-8 text-white shadow-lg">
              <div className="text-5xl mb-6">✨</div>
              <p className="text-2xl font-bold mb-6 leading-relaxed">"{dailyQuote.quote}"</p>
              <div className="flex items-center gap-2 mb-4">
                <span className="text-lg font-semibold">{dailyQuote.musical}</span>
                <span className="text-sm opacity-90">- {dailyQuote.character}</span>
              </div>
              <div className="flex gap-4 pt-6 border-t border-white border-opacity-20">
                <button
                  onClick={() => toggleFavorite(dailyQuote.id)}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg transition-all ${
                    favorites.includes(dailyQuote.id)
                      ? 'bg-white bg-opacity-20'
                      : 'hover:bg-white hover:bg-opacity-10'
                  }`}
                >
                  <Heart size={20} fill={favorites.includes(dailyQuote.id) ? 'white' : 'none'} />
                  <span>{favorites.includes(dailyQuote.id) ? '좋아요' : '좋아요'}</span>
                </button>
                <button className="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-white hover:bg-opacity-10 transition-all">
                  <Share2 size={20} />
                  <span>공유</span>
                </button>
              </div>
            </div>

            {/* 대사 추가 버튼 */}
            <button
              onClick={() => setShowAddForm(!showAddForm)}
              className="w-full bg-white border-2 border-purple-600 text-purple-600 font-bold py-4 px-6 rounded-xl hover:bg-purple-50 transition-all flex items-center justify-center gap-2"
            >
              <Plus size={24} />
              <span>내 대사 추가</span>
            </button>
          </div>
        )}

        {/* 대사 추가 폼 */}
        {showAddForm && (
          <div className="bg-white rounded-2xl p-6 mb-8 border-2 border-purple-200 shadow-lg">
            <h3 className="text-xl font-bold mb-4">✍️ 마음에 드는 대사 추가</h3>
            <form onSubmit={addQuote} className="space-y-4">
              <textarea
                value={formData.quote}
                onChange={(e) => setFormData({...formData, quote: e.target.value})}
                placeholder="대사를 입력하세요"
                className="w-full border-2 border-gray-300 rounded-xl p-4 focus:border-purple-600 focus:outline-none resize-none"
                rows="3"
                required
              />
              <div className="grid grid-cols-2 gap-4">
                <input
                  type="text"
                  value={formData.musical}
                  onChange={(e) => setFormData({...formData, musical: e.target.value})}
                  placeholder="뮤지컬명"
                  className="border-2 border-gray-300 rounded-xl p-3 focus:border-purple-600 focus:outline-none"
                  required
                />
                <input
                  type="text"
                  value={formData.character}
                  onChange={(e) => setFormData({...formData, character: e.target.value})}
                  placeholder="배역명"
                  className="border-2 border-gray-300 rounded-xl p-3 focus:border-purple-600 focus:outline-none"
                />
              </div>
              <select
                value={formData.emotion}
                onChange={(e) => setFormData({...formData, emotion: e.target.value})}
                className="w-full border-2 border-gray-300 rounded-xl p-3 focus:border-purple-600 focus:outline-none"
              >
                {emotions.slice(1).map(e => (
                  <option key={e} value={e}>{e}</option>
                ))}
              </select>
              <div className="flex gap-2">
                <button
                  type="submit"
                  className="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-3 px-6 rounded-xl hover:shadow-lg transition-all"
                >
                  추가하기
                </button>
                <button
                  type="button"
                  onClick={() => setShowAddForm(false)}
                  className="flex-1 bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-xl hover:bg-gray-300 transition-all"
                >
                  취소
                </button>
              </div>
            </form>
          </div>
        )}

        {/* 탐색 탭 */}
        {activeTab === 'explore' && (
          <div className="space-y-6">
            {/* 검색바 */}
            <div className="relative">
              <Search size={20} className="absolute left-4 top-4 text-gray-400" />
              <input
                type="text"
                placeholder="대사, 뮤지컬, 배역으로 검색..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
                className="w-full pl-12 pr-4 py-3 border-2 border-gray-300 rounded-xl focus:border-purple-600 focus:outline-none"
              />
            </div>

            {/* 감정 필터 */}
            <div className="flex gap-2 overflow-x-auto pb-2">
              {emotions.map(emotion => (
                <button
                  key={emotion}
                  onClick={() => setSelectedEmotion(emotion)}
                  className={`px-4 py-2 rounded-full whitespace-nowrap font-semibold transition-all ${
                    selectedEmotion === emotion
                      ? `${emotionColors[emotion] || 'bg-gray-300 text-gray-800'}`
                      : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                  }`}
                >
                  {emotion === 'all' ? '전체' : emotion}
                </button>
              ))}
            </div>

            {/* 대사 리스트 */}
            <div className="grid gap-4">
              {filteredQuotes.length > 0 ? (
                filteredQuotes.map(q => (
                  <div key={q.id} className="bg-white rounded-xl p-6 shadow hover:shadow-md transition-all border-l-4 border-purple-400">
                    <div className="flex justify-between items-start gap-4">
                      <div className="flex-1">
                        <p className="text-lg font-semibold mb-3 leading-relaxed">"{q.quote}"</p>
                        <div className="flex items-center gap-2 mb-3">
                          <span className="font-medium text-gray-700">{q.musical}</span>
                          <span className="text-sm text-gray-600">- {q.character}</span>
                        </div>
                        <div className="flex gap-2">
                          <span className={`px-3 py-1 rounded-full text-sm font-semibold ${emotionColors[q.emotion] || 'bg-gray-100 text-gray-800'}`}>
                            {q.emotion}
                          </span>
                          <span className="px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-700">
                            {q.year}
                          </span>
                        </div>
                      </div>
                      <button
                        onClick={() => toggleFavorite(q.id)}
                        className="flex-shrink-0 p-2 hover:bg-gray-100 rounded-lg transition-all"
                      >
                        <Heart
                          size={24}
                          fill={favorites.includes(q.id) ? 'currentColor' : 'none'}
                          className={favorites.includes(q.id) ? 'text-red-500' : 'text-gray-400'}
                        />
                      </button>
                    </div>
                  </div>
                ))
              ) : (
                <div className="text-center py-12 text-gray-500">
                  <p className="text-lg mb-2">검색 결과가 없습니다</p>
                  <p className="text-sm">다른 검색어나 필터를 시도해보세요</p>
                </div>
              )}
            </div>
          </div>
        )}

        {/* 즐겨찾기 탭 */}
        {activeTab === 'favorites' && (
          <div className="space-y-4">
            {favorites.length > 0 ? (
              quotes
                .filter(q => favorites.includes(q.id))
                .map(q => (
                  <div key={q.id} className="bg-white rounded-xl p-6 shadow hover:shadow-md transition-all border-l-4 border-red-400">
                    <div className="flex justify-between items-start gap-4">
                      <div className="flex-1">
                        <p className="text-lg font-semibold mb-3 leading-relaxed">"{q.quote}"</p>
                        <div className="flex items-center gap-2 mb-3">
                          <span className="font-medium text-gray-700">{q.musical}</span>
                          <span className="text-sm text-gray-600">- {q.character}</span>
                        </div>
                        <div className="flex gap-2">
                          <span className={`px-3 py-1 rounded-full text-sm font-semibold ${emotionColors[q.emotion] || 'bg-gray-100 text-gray-800'}`}>
                            {q.emotion}
                          </span>
                          <span className="px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-700">
                            {q.year}
                          </span>
                        </div>
                      </div>
                      <button
                        onClick={() => toggleFavorite(q.id)}
                        className="flex-shrink-0 p-2 hover:bg-gray-100 rounded-lg transition-all"
                      >
                        <Heart
                          size={24}
                          fill="currentColor"
                          className="text-red-500"
                        />
                      </button>
                    </div>
                  </div>
                ))
            ) : (
              <div className="text-center py-12 text-gray-500">
                <Heart size={48} className="mx-auto mb-4 opacity-20" />
                <p className="text-lg mb-2">아직 즐겨찾기한 대사가 없습니다</p>
                <p className="text-sm">마음에 드는 대사를 ❤️ 버튼으로 저장해보세요</p>
              </div>
            )}
          </div>
        )}
      </main>

      {/* 푸터 */}
      <footer className="bg-white border-t mt-16 py-8">
        <div className="max-w-4xl mx-auto px-4 text-center text-gray-600">
          <p className="mb-2">뮤지컬 대사 일력 v1.0</p>
          <p className="text-sm">마음에 드는 대사를 공유하고 감상하는 공간 🎭</p>
        </div>
      </footer>
    </div>
  );
}
    </script>
</body>
</html>
